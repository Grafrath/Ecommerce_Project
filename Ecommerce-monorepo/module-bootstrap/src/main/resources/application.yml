# 1. Next.js 3000
server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:ecommerce;INIT=CREATE SCHEMA IF NOT EXISTS CORE\; CREATE SCHEMA IF NOT EXISTS CATALOG\; CREATE SCHEMA IF NOT EXISTS SUPPORT;
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: CORE

  data:
    redis:
      host: localhost
      port: 6379