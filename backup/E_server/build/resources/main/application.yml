server:
  port: 8761

eureka:
  instance:
    # 3대 PC 환경이므로 호스트 이름보다는 IP 주소 사용을 선호하도록 설정합니다.
    prefer-ip-address: true
    hostname: 192.168.1.16
  client:
    # 서버 자신이 자기 자신을 리스트에 등록할 필요는 없습니다.
    register-with-eureka: false
    # 서버가 다른 서버로부터 리스트를 가져올 필요도 없습니다.
    fetch-registry: false
    service-url:
      defaultZone: http://192.168.1.16:8761/eureka/

spring:
  application:
    name: discovery-server